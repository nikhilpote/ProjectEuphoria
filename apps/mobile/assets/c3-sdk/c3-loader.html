<!DOCTYPE html><html><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">
<link rel="stylesheet" href="style.css">
<style>
#euphoria-hud {
  position: fixed;
  top: 8px; left: 50%;
  transform: translateX(-50%);
  z-index: 9999;
  pointer-events: none;
  display: flex;
  align-items: center;
  gap: 6px;
  background: rgba(13,13,26,0.85);
  border: 1px solid #2A2A4A;
  border-radius: 20px;
  padding: 6px 14px;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 13px;
  font-weight: 700;
  color: #9CA3AF;
  opacity: 0;
  transition: opacity 0.4s;
}
#euphoria-hud.visible { opacity: 1; }
#euphoria-hud .level-dots {
  display: flex;
  gap: 4px;
}
#euphoria-hud .dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: #2A2A4A;
  transition: background 0.3s, box-shadow 0.3s;
}
#euphoria-hud .dot.filled {
  background: #7C3AED;
  box-shadow: 0 0 6px rgba(124,58,237,0.5);
}
#euphoria-hud .dot.current {
  background: #F59E0B;
  box-shadow: 0 0 8px rgba(245,158,11,0.6);
}
#euphoria-hud.won {
  border-color: #10B981;
  color: #10B981;
}
#euphoria-hud.won .dot.filled {
  background: #10B981;
  box-shadow: 0 0 6px rgba(16,185,129,0.5);
}
</style>
</head>
<body>

<div id="euphoria-hud">
  <span id="hud-label">LEVEL</span>
  <div class="level-dots" id="hud-dots"></div>
</div>

<script src="box2d.wasm.js"></script>
<script src="scripts/supportcheck.js"></script>
<script src="scripts/offlineclient.js" type="module"></script>
<script src="scripts/main.js" type="module"></script>
<script>
(function() {
  var answered = false;
  var startTs = Date.now();
  var config = { requiredLevel: 4 };
  var lastLevel = -1;

  // ── HUD ──
  var $hud = document.getElementById('euphoria-hud');
  var $dots = document.getElementById('hud-dots');

  function buildDots() {
    $dots.innerHTML = '';
    for (var i = 0; i < config.requiredLevel; i++) {
      var d = document.createElement('div');
      d.className = 'dot';
      $dots.appendChild(d);
    }
  }

  function updateHUD(level) {
    if (level === lastLevel) return;
    lastLevel = level;
    var dots = $dots.children;
    for (var i = 0; i < dots.length; i++) {
      dots[i].className = 'dot' + (i < level ? ' filled' : '') + (i === level ? ' current' : '');
    }
    if (level >= config.requiredLevel) {
      $hud.classList.add('won');
    }
  }

  // ── Parse config from native bridge ──
  function parseInit(g) {
    if (g && g.requiredLevel) config.requiredLevel = Number(g.requiredLevel);
    buildDots();
  }

  if (location.hash && location.hash.length > 1) {
    try { parseInit(JSON.parse(decodeURIComponent(location.hash.slice(1)))); } catch(e) {}
  }
  if (window.__EUPHORIA_GAME__) {
    parseInit(window.__EUPHORIA_GAME__.payload || window.__EUPHORIA_GAME__);
  }
  window.addEventListener('message', function(e) {
    var msg;
    try { msg = typeof e.data === 'string' ? JSON.parse(e.data) : e.data; } catch(err) { return; }
    if (msg && msg.type === 'GAME_INIT' && msg.payload) parseInit(msg.payload);
  });

  buildDots();

  function postToNative(msg) {
    var str = JSON.stringify(msg);
    if (window.ReactNativeWebView) window.ReactNativeWebView.postMessage(str);
    else window.parent.postMessage(str, '*');
  }

  // ── Monitor C3 runtime ──
  var checkInterval = setInterval(function() {
    var rt = window.c3_runtimeInterface;
    if (!rt) return;
    var localRt = rt._localRuntime;
    if (!localRt) return;
    var esm = localRt._eventSheetManager;
    if (!esm) return;
    var globals = esm._allGlobalVars;
    if (!globals || !globals.length) return;

    // Show HUD once game is running
    $hud.classList.add('visible');

    var score = null, level = null;
    for (var i = 0; i < globals.length; i++) {
      var v = globals[i];
      var name = v._name || '';
      var val = v._value;
      if (name === 'score') score = val;
      if (name === 'Level') level = val;
    }

    if (level !== null) updateHUD(level);

    if (level !== null && level >= config.requiredLevel && !answered) {
      answered = true;
      clearInterval(checkInterval);
      postToNative({
        type: 'SUBMIT_ANSWER',
        payload: {
          gameType: 'tap_tap_shoot',
          correct: true,
          score: score || level,
          timeTakenMs: Date.now() - startTs
        }
      });
    }
  }, 500);

  var readyCheck = setInterval(function() {
    if (window.c3_runtimeInterface && window.c3_runtimeInterface._localRuntime) {
      clearInterval(readyCheck);
      postToNative({ type: 'READY' });
    }
  }, 200);
})();
</script>
</body></html>
