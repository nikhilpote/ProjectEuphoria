<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Wording</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; user-select:none; -webkit-user-select:none; outline:none; }
html, body { background:#0D0D1A; color:#fff; height:100%; overflow:hidden; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; }
a { white-space:nowrap; }
input { user-select:auto; -webkit-user-select:auto; }

.scoreAdd { animation:scoreAdd .3s ease-in-out .2s 1 forwards; }
@keyframes scoreAdd { 0%{color:#fff} 40%{transform:translateY(-15%);color:#3D3} 100%{transform:translateY(0);color:#3D3} }

.goodWord { animation:goodWord .3s ease-in-out 1 forwards; }
@keyframes goodWord { 0%{transform:scale(1);color:#fff} 40%{transform:scale(1.2) translateY(5%);color:#3D3} 100%{transform:scale(.5) translateY(-55%);color:#6F6;opacity:0} }

.badWord { animation:badWord .3s ease-in-out 1 forwards; }
@keyframes badWord { 0%{transform:translateX(0);color:#fff} 33%{transform:translateX(2%);color:#F55} 66%{transform:translateX(-2%);color:#F55} 100%{transform:translateX(0);color:#F55} }

.didWord { animation:didWord .3s ease-in-out 1 forwards; }
@keyframes didWord { 0%{transform:translateX(0);color:#fff} 33%{transform:translateX(1%);color:#888} 66%{transform:translateX(-1%);color:#888} 100%{transform:translateX(0);color:#888} }

.shake { animation:shake .4s ease-in-out 1 forwards; background:#F55; transition:all .2s ease; }
@keyframes shake { 0%{transform:translateX(0)} 33%{transform:translateX(2%)} 66%{transform:translateX(-2%)} 100%{transform:translateX(0)} }

@keyframes blink { 0%{opacity:1} 10%{opacity:0} 50%{opacity:0} 60%{opacity:1} 100%{opacity:1} }
.tileOuter { transition:all 1s linear; }

.tile { overflow:hidden; z-index:1; background:linear-gradient(0deg, #5B21B6 50%, #7C3AED 100%); color:#FFF; position:relative; font-size:18rem; font-weight:bold; cursor:pointer; width:100%; height:100%; border-radius:3rem; display:flex; align-items:center; justify-content:center; border-bottom:.5rem solid #3B0764; }
.tile.down { background:linear-gradient(0deg, #059669 50%, #10B981 100%); border-bottom-color:#064E3B; }
.tile.did { animation:.8s ease 0s 1 normal forwards running goGrey; }
.tile.bad { animation:.8s ease 0s 1 normal forwards running goRed; }
.tileBg { position:absolute; top:0; left:0; bottom:0; right:0; display:flex; align-items:center; justify-content:center; }
.tileGoodBg { position:absolute; top:0; left:0; bottom:0; right:0; opacity:0; background:linear-gradient(0deg, #10B981 50%, #6EE7B7 100%); }
.tile.good .tileGoodBg { animation:.4s ease 0s 1 normal forwards running fadeInBlink; }

@keyframes goRed { 0%{filter:brightness(.8) hue-rotate(55deg)} 100%{filter:brightness(1) hue-rotate(0deg)} }
@keyframes goGrey { 0%{filter:brightness(.8) grayscale(1)} 100%{filter:brightness(1) grayscale(0)} }
@keyframes fadeInBlink { 0%{opacity:0} 5%{opacity:1;filter:brightness(1)} 25%{opacity:1;filter:brightness(1.5)} 45%{opacity:1;filter:brightness(1)} 100%{opacity:0} }

.goGreenEmoji { animation:goGreenEmoji .4s ease 1 forwards; }
@keyframes goGreenEmoji { 0%{color:#fff} 50%{color:#10B981} 100%{color:#fff} }

.fadeOutUp { animation:fadeOutUp .4s ease 1 forwards; }
@keyframes fadeOutUp { 0%{top:10rem;opacity:0} 10%{top:9rem;opacity:1} 100%{top:4rem;opacity:0} }

.score { font-family:'SF Mono','Roboto Mono',monospace; font-weight:bold; }

/* Euphoria HUD */
#euphoria-hud {
  position:fixed; top:8px; left:50%; transform:translateX(-50%);
  z-index:99999; pointer-events:none; display:flex; align-items:center; gap:8px;
  background:rgba(13,13,26,0.9); border:1px solid #2A2A4A; border-radius:20px;
  padding:6px 14px; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  font-size:14px; font-weight:700; color:#9CA3AF;
}
#hud-status { display:none; font-size:11px; font-weight:800; letter-spacing:1px; padding:2px 8px; border-radius:10px; }
#hud-status.passed { display:inline; background:#10B981; color:#fff; }

#page {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  height:100vh; width:100%; padding:40px 8px 8px;
}
#gGameDiv { display:none; width:100%; max-width:400px; }
#gBoardDiv { display:flex; flex-wrap:wrap; width:100%; aspect-ratio:1; }
#gScoreRowDiv { text-align:center; font-size:8rem; padding:2rem 0; }
#gTimeRowDiv { text-align:center; font-size:5rem; color:#9CA3AF; position:relative; }
#gTimeAddDiv { position:absolute; right:2rem; color:#10B981; font-size:4rem; }
#gWordNowDiv { text-align:center; font-size:7rem; min-height:8rem; font-weight:bold; }
#gWordLastDiv { text-align:center; font-size:4rem; color:#6B7280; min-height:5rem; }
#gWordLastInfoDiv { text-align:center; font-size:3rem; color:#4B5563; }
#gPauseDiv { display:none; }
#gPausedDiv, #gGameOverDiv, #gGameLoadingDiv, #gTitleDiv, #gTutorialDiv, #gScoresPageDiv { display:none; }
#gFooter { display:none; }
#gBackButton, #gSoundButton, #gReportWordDiv { display:none !important; }
#gDemoDiv { display:none; }
#gDailyDiv, #gDailyNextDiv { display:none; }
#gTitlePlayDiv, #gTitleLoadingDiv { display:none; }
#gWordViewingWordDiv, #gWordViewingDefDiv { display:none; }
</style>
</head>
<body>
<div id="euphoria-hud">
  <span id="hud-score">0 / 10</span>
  <span id="hud-status"></span>
</div>

<div id="page">
  <div id="gGameDiv">
    <div id="gScoreRowDiv"><span id="gScoreDiv">0</span></div>
    <div id="gWordNowDiv"></div>
    <div id="gBoardDiv"></div>
    <div id="gTimeRowDiv"><span id="gTimeDiv">99</span><span id="gTimeAddDiv"></span></div>
    <div id="gWordLastDiv"></div>
    <div id="gWordLastInfoDiv"></div>
  </div>
</div>

				if(load) {

				game.levelScoreAverage = game.levelScoreTotal/game.levelPlays | 0

					if(gameId == game.dailyId) {
						game.storageSet('dailyGameId', game.dailyId)
						game.storageSet('dailyScore', 0)
						game.storageSet('dailyWords', '')
						game.storageSet('dailyWordUnique', '')
						game.storageSet('dailyWordMissed', '')
					}
					if(load) {
						game.start()
					}
				} else {
					game.score = vals[8]*1
					var words = vals[9]
					game.levelWordUnique = vals[10]
					game.levelWordMissed = vals[11]
					// in case you cleared your cache and already played today. and somehow logged back in.
					if(gameId == game.dailyId) {
						game.storageSet('dailyGameId', game.dailyId)
						game.storageSet('dailyScore', game.score)
						game.storageSet('dailyWords', words)
						game.storageSet('dailyWordUnique', game.levelWordUnique)
						game.storageSet('dailyWordMissed', game.levelWordMissed)

	setup: function() {
		game.tiles = []
		game.mouseDown = false
		game.totalSecondsStart = 99
		game.timeBeforePause = 0
		game.state = 'tutorial'
		
		game.board = []
		
		for(var x=0; x<game.boardSizeX; x++) {
			game.board[x] = []
			for(var y=0; y<game.boardSizeY; y++) {
				game.board[x][y] = ''
			}
		}
		
		if(game.id) {
			game.boardSetup()
		}
		
		window.addEventListener("keydown", e => {
			if(e.keyCode == 27) {
				if(game.state == 'playing') {
					game.pause()
				} else if(game.state == 'paused') {
					game.unPause()
				} else if(game.state == 'scores' || game.state == 'viewing' || game.state == 'over') {
					gBackButton.onclick()
				}
				return
			}
			if(game.state == 'playing') {
				if(e.keyCode > 64 && e.keyCode < 91) {
					game.tileClassesReset()

					var letter = String.fromCharCode(e.keyCode)
					var word = game.wordNowGet()
					word += letter
					gWordNowDiv.innerHTML = word
					var nodes = game.wordFindAnywhere(word)
					if(!nodes.length) {
						game.released(null, word)
					} else {
						game.tiles = nodes
						var tile0 = null
						for(var tile of game.tiles) {
							var tileDiv = document.getElementById('gTileDiv'+tile.x+'by'+tile.y)
							tileDiv.classList.add('down')
							if(tile0)
								game.tileSideShow(tile0, tile.x, tile.y)
							tile0 = tile
						}
					}
				}
				if(e.keyCode == 13) {
					game.released()
				}
			}
		})
		
		document.addEventListener("touchstart", e => {
			var touch = e.changedTouches[0]
			if(touch) {
				game.clicked(touch.clientX, touch.clientY, e.target)
			}
			if(!gBlockTaps(e)) {
				return true
			}
			e.preventDefault()
			return false
		}, {passive:false})
		
		document.addEventListener("touchcancel", e => {
			game.released(e.target)
			if(!gBlockTaps(e)) {
				return true
			}
			e.preventDefault()
			return false
			
		}, {passive:false})

		document.addEventListener("touchend", e => {
			game.released(e.target)
			if(!gBlockTaps(e)) {
				return true
			}
			e.preventDefault()
			return false
			
		}, {passive:false})
		
		document.addEventListener("touchmove", e => {
			var touch = e.changedTouches[0]
			if(touch) {
				game.dragged(touch.clientX, touch.clientY)
			}
			if(!gBlockTaps(e)) {
				return true
			}
			e.preventDefault()
			return false
		}, {passive:false})
		
		window.addEventListener("mousedown", e => {
			game.clicked(e.clientX, e.clientY, e.target)
		}, {passive:false})
		
		window.addEventListener("mouseup", e => {
			game.released(e.target)
		}, {passive:false})
		
		window.addEventListener("mousemove", e => {
			game.dragged(e.clientX, e.clientY)
		}, {passive:false})
		
		window.onresize = _ => {
			game.resize()
			
			// extra resize for mobile. especially on orientation change is needed. the event for orientationchange doesn't ever fire on ios.
			setTimeout(_=>game.resize(true), 555)
			setTimeout(_=>game.resize(true), 1555)
		}
		
		window.onresize()
		
		game.wordsSetup()
		
		if(game.storageGetNum('tutorialSaw')==1) {
			game.state = 'title'
		}
		game.stateGo(game.state)
		
		
		game.mute(game.storageGetNum('soundOff'))
		
		game.levelNumberInputChange(game.storageGetNum('levelNumberPlayed')+1)
		
		setTimeout(_=> {
			game.soundTickTock = gAudio.load("sound/tickTock.mp3")
			game.soundWordGood = gAudio.load("sound/wordGood.mp3")
			game.soundWordBad = gAudio.load("sound/wordBad.mp3")

			game.soundBack = gAudio.load("sound/pause.mp3")

	wordFindAnywhere: function(word) {
		for(var x=0; x<game.boardSizeX; x++) {
			for(var y=0; y<game.boardSizeY; y++) {
				if(game.board[x][y] == word[0]) {
					var nodes = game.wordFind(x,y,word)
					if(nodes.length) {
						return nodes
					}
				}
			}
		}
		return []
	},
	wordFind: function(x0,y0,word) {
		
		if(word.length < 2) {
			return game.board[x0][y0] == word ? [{x:x0, y:y0}] : []
		}
		
		var words = []
		
		var node = {
			x: x0,
			y: y0,
			did: [],
			letterI: 0,
		}
		node.did[y0*game.boardSizeX+x0] = true
		
		var nodes = [node]
		
		var nodeI = 0
		while(1) {
			var node = nodes[nodeI]
			if(!node)break
			for(var addY=-1;addY<=1;addY++) {
				for(var addX=-1;addX<=1;addX++) {
					if(addX==0 && addY==0)continue
					var x2 = node.x+addX
					var y2 = node.y+addY
					if(game.inBoard(x2,y2)) {
						if(game.board[x2][y2] == word[node.letterI+1]) {
							if(!node.did[y2*game.boardSizeX+x2]) {
								var node2 = {
									x: x2,
									y: y2,
									did: node.did.slice(0),
									letterI: node.letterI+1,
									parent: node,
								}
								
								if(node.letterI == word.length-2) {
									var list = []
									while(node2) {
										list.unshift({x:node2.x, y:node2.y})
										node2=node2.parent
									}
									return list
								}
								
								node2.did[y2*game.boardSizeX+x2] = true
								nodes.push(node2)
							}
						}
					}
				}
			}
			nodeI++
		}
		return []
	},
	inBoard: function(x,y) {
		return x>=0 && y>=0 && x<game.boardSizeX && y<game.boardSizeY
	},

	tick: function() {
		if(game.state == 'playing' || game.state == 'paused') {
			game.timeDraw()
			if(game.state == 'playing') {
				if(!game.tiles.length) {
					game.gameOverCheck()
				}
				var seconds = Math.floor(game.secondsRemainingGet())
				if(seconds == 8 && !gAudio.isPlaying(game.soundTickTock)) {
					gAudio.play(game.soundTickTock)
				}
			}
		}
		
		if(game.dailySecsLeft > 0) {
			game.dailySecsLeft--
			if(game.dailySecsLeft == 0) {
				gDailyNextDiv.innerHTML = "Reload for the next challenge."
			} else if(game.state == 'title') {
				var hours = game.dailySecsLeft/60/60 |0
				var mins = game.dailySecsLeft/60 -hours*60 |0
				var secs = game.dailySecsLeft %60 |0
				gDailyNextDiv.innerHTML = "Next challenge in "+hours+" hours "+mins+" minutes "+secs+" seconds."
			}
		}
	},
	gameOverCheck: function() {
		if(game.secondsRemainingGet() <= 0) {
			game.gameOver()
		}
	},
	wordsInBoardDraw: function() {
		var html = ''
		var i=0,dids=0
		for(var wordObj of game.wordsInBoardSorted) {
			i++
			var icons = '', did=wordObj.did
			if(wordObj.did) {
				dids++
				icons += `<span class=emoji style='font-weight:normal;text-shadow:0 0 0.5rem white'>🏆</span>`
				if(game.levelWordUnique && game.levelWordUnique == wordObj.name) {
					icons += `<span style='font-size:50%'>Rare Find!</span>`
				}
			} else {
				if(game.levelWordMissed && game.levelWordMissed == wordObj.name) {

	share: function(button) {
		var tiles = []
		for(var word of game.wordsInBoardSorted) {
			if(word.did) {
				tiles = game.wordFindAnywhere(word.name)
				break
			}
		}
		var text = ''
		for(var y=0; y<game.boardSizeY; y++) {
			for(var x=0; x<game.boardSizeX; x++) {
				var c = '🟪'
				for(var i=0; i<tiles.length; i++) {
					var tile = tiles[i]
					if(tile.x==x && tile.y==y) {
						var next = tiles[i+1]
						if(!next) {
							c = '✅'
						} else {
							var distX = next.x - tile.x
							var distY = next.y - tile.y
							if(distX > 0) {
								if(distY > 0) {
									c = '↘'
								} else if(distY < 0) {
									c = '↗'
								} else {
									c = '➡'
								}
							} else if(distX < 0) {
								if(distY > 0) {
									c = '↙'
								} else if(distY < 0) {
									c = '↖'
								} else {
									c = '⬅'
								}
							} else {
								if(distY > 0) {
									c = '⬇'
								} else {
									c = '⬆'
								}
							}
						}
						break
					}
				}
				text += c
			}
			text += '\n'
		}
		
		var level = game.id==game.dailyId ? "today":"on level "+game.id
		text = "Best Wording I found "+level+":\n"+text+"Final Score: 🏆"+game.score
		if(game.levelWordUnique) {
			//text += "\nRare Find: "+game.levelWordUnique
		}
		
		navigator.clipboard.writeText(text).then(() => {
			button.innerHTML = '✅ Copied!'
			setTimeout(() => button.innerHTML = "🏆 Share Score",888)
		}, () => {
			console.error('Failed to copy')
		})
		
	},
	gameOver: function() {
		
		if(window.CrazyGames)window.CrazyGames.SDK.game.gameplayStop()
		
		if(game.score < 1) {
			game.stateGo('title')
			return
		}
		
		game.levelWordUnique = ''
		game.levelWordMissed = ''
		game.scoreSaveLoading = 1
		game.levelScoreAverage = 0
		game.levelScoreBest = 0
		game.levelScoreTotal = 0
		game.levelPlays = 0
		
		game.stateGo('over')
		
		var words=''
		for(var name in game.wordsInBoard) {
			var word = game.wordsInBoard[name]
			if(word.did) {
				words+='_'+name
			}
		}
		words = words.substr(1)
		
		if(game.id == game.dailyId) {
			game.storageSet('dailyGameId', game.dailyId)
			game.storageSet('dailyScore', game.score)
			game.storageSet('dailyWords', words)
			game.storageSet('dailyWordUnique', '')
			game.storageSet('dailyWordMissed', '')
		}
		
		game.ajax('scoreSave.php?gameId='+game.id+'&score='+game.score+'&playId='+game.playId+'&words='+words, (vals) => {
			game.scoreSaveLoading = 0
			if(vals[0] == 'good') {
				if(vals[1]*1) {
					game.score = vals[1]*1
				}
				game.levelScoreBest = vals[2]*1
				game.levelPlays = vals[3]*1
				game.levelScoreTotal = vals[4]*1
				game.levelScoreAverage = game.levelScoreTotal/game.levelPlays | 0
				game.levelWordUnique = vals[5]
				game.levelWordMissed = vals[6]
				if(game.id == game.dailyId && game.id == game.storageGetNum('dailyGameId')) {
					game.storageSet('dailyScore', game.score)
					game.storageSet('dailyWords', words)
					game.storageSet('dailyWordUnique', game.levelWordUnique)
					game.storageSet('dailyWordMissed', game.levelWordMissed)
				}
				if(game.state == 'over')game.stateGo('over')
			} else {
				alert("Error: "+vals[1])
				game.stateGo('title')
			}
		})
	},

	secondsRemainingGet: function() {
		return game.totalSeconds - (Date.now()-game.startTime)/1000
	},

	resize: function(isExtra) {
		document.documentElement.style.fontSize = innerWidth / page.clientHeight < .75 ? '1vw': page.clientHeight/100*.74+'px'
		
		game.sizeX = game.sizeY = gBoardDiv.clientWidth
		
		game.tileSizeX = game.sizeX / game.boardSizeX
		game.tileSizeY = game.sizeY / game.boardSizeY
		game.letterSizeX = game.sizeX / game.boardSizeX * .7 * 9/13
		game.letterSizeY = game.sizeY / game.boardSizeY * .7
		
		var bounds = gBoardDiv.getBoundingClientRect()
		game.boardX = bounds.left
		game.boardY = bounds.top

			}

	wordNowGet: function() {
		var word = ''
		for(var tile of game.tiles) {
			word += game.board[tile.x][tile.y]
		}
		return word
	},
	wordPointsGet: function(word) {
		var len = word.length
		var score = 0
		for(var i=0; i<len; i++) {
			score += game.rare[word[i]]||1
		}
		return score
	},
	released: function(div, word) {
		
		game.clickNo()
		if(game.state == 'playing') {
			if(!word)
				word = game.wordNowGet()
			var score = 0
			if(word.length > 1) {
				var wordObj = game.wordsInBoard[word]
				if(wordObj) {
					if(!wordObj.did) {
						wordObj.did = true
						
						score = wordObj.points
						
						game.score += score
						gScoreDiv.innerHTML = game.score
						if(word.length > 3) {
							if(Math.floor(game.secondsRemainingGet()) > 0) {
								var add = word.length-3
								game.totalSeconds += add
								gTimeAddDiv.innerHTML = "+"+add
								gTimeAddDiv.classList.add('fadeOutUp')
								gTimeDiv.parentNode.classList.add('goGreenEmoji')
								setTimeout(_=>{
									gTimeDiv.parentNode.classList.remove('goGreenEmoji')
									gTimeAddDiv.innerHTML = ""
									gTimeAddDiv.classList.remove('fadeOutUp')
								},400)
							}
						}
						
						if(score > game.bestWordPoints) {
							game.bestWord = word
							game.bestWordPoints = score
						}
						
						gAudio.setVolume(game.soundWordGood, .5+Math.min(word.length,10)/10*.5)
						gAudio.play(game.soundWordGood)
						gWordNowDiv.classList.add('goodWord')
						gScoreRowDiv.classList.add('scoreAdd')
						setTimeout(_=>{
							if(gWordNowDiv.classList.contains('goodWord')) {
								gWordNowDiv.classList.remove('goodWord')
								gWordNowDiv.innerHTML = ''
								setTimeout(_=>{
									if(gScoreRowDiv.classList.contains('scoreAdd')) {
										gScoreRowDiv.classList.remove('scoreAdd')
									}
								}, 200)
							}
						}, 300)
					}
				}
				
				gWordLastDiv.innerHTML = word
				if(!wordObj) {
					gWordLastInfoDiv.innerHTML = `
						Not Found. Should it be in the dictionary?
						<button onclick='game.wordSuggestLast()' class='button' style='margin-left:1rem;font-size:2rem;padding:1rem'>
							Add Word
						</button>
					`
				} else {
					gWordLastInfoDiv.innerHTML = score ? `🏆${score}!`: 'Already Found'
				}
				game.lastWord = word
			}
			
			if(!score) {
				if(wordObj) {
					gAudio.play(game.soundWordDid)
					gWordNowDiv.classList.add('didWord')
					setTimeout(_=>{
						if(gWordNowDiv.classList.contains('didWord')) {
							gWordNowDiv.classList.remove('didWord')
							gWordNowDiv.innerHTML = ''
						}
					}, 300)
				} else {
					if(word.length) {
						gAudio.play(game.soundWordBad)
						gWordNowDiv.classList.add('badWord')
					}
					setTimeout(_=>{
						if(gWordNowDiv.classList.contains('badWord')) {
							gWordNowDiv.classList.remove('badWord')
							gWordNowDiv.innerHTML = ''
						}
					}, 300)
				}
			}
			
			var time=0
			for(var tile of game.tiles) {
				setTimeout(function(tile) {
					var boardX = tile.x
					var boardY = tile.y
					var tileDiv = document.getElementById('gTileDiv'+boardX+'by'+boardY)
					tileDiv.classList.remove('down')
					tileDiv.classList.add(score ? 'good': (wordObj?'did':'bad'))
					game.tileSideHide(boardX, boardY)
				}.bind(game,tile), time)
				time+=score ? 6:3
			}
			game.tiles = []
			game.gameOverCheck()
		} else if(game.state == 'tutorial') {
			game.stateGo('title')
			game.storageSet('tutorialSaw', 1)
		}
		game.mouseDown = false
	},
	clickNo: function() {
		if(game.downDiv) {
			if(game.downDiv.className=='word') {
				game.downDiv.style.color='inherit'
			}
			game.downDiv = null
		}
	},
	dragged: function(x,y) {
		if(game.mouseDown) {
			game.clickNo()
			game.clicked(x,y)
		}
	},
	clicked: function(x,y,div) {
		game.downDiv = div
		if(div && div.className=='word') {
			div.style.color='#1F1'
		}
		game.mouseDown = true
		
		if(game.state != 'playing')return
		x -= game.boardX
		y -= game.boardY
		if(x<0 || y<0)return
		
		if(game.tiles.length) {
			var margin = .05
			var modX = x/game.tileSizeX%1-.5
			var modY = y/game.tileSizeY%1-.5
			if(Math.sqrt(modX*modX + modY*modY) > .45 ) {
				return
			}
		}
		
		var boardX = x/game.tileSizeX|0
		var boardY = y/game.tileSizeY|0
		
		if(game.inBoard(boardX,boardY)) {
			for(var tile of game.tiles) {
				if(tile.x == boardX && tile.y == boardY) {
					if(tile == game.tiles[game.tiles.length-2]) {
						tile = game.tiles[game.tiles.length-1]
						boardX = tile.x
						boardY = tile.y
						var tileDiv = document.getElementById('gTileDiv'+boardX+'by'+boardY)
						tileDiv.classList.remove('down')
						
						for(var tile of game.tiles) {
							game.tileSideHide(tile.x, tile.y)
						}
						
						game.tiles.pop()
						
						var tile0
						for(var tile of game.tiles) {
							if(tile0)
								game.tileSideShow(tile0, tile.x, tile.y)
							tile0 = tile
						}
						
						var word = game.wordNowGet()
						gWordNowDiv.innerHTML = word
					}
					return
				}
			}
			if(tile) {
				if(Math.abs(tile.x-boardX) > 1 || Math.abs(tile.y-boardY) > 1) {
					return
				}
				game.tileSideShow(tile, boardX, boardY)
			}
			
			game.tiles.push({x:boardX,y:boardY})
			
			//game.board[boardX][boardY] = 'X'
			var tileDiv = document.getElementById('gTileDiv'+boardX+'by'+boardY)
			tileDiv.classList.remove('bad')
			tileDiv.classList.remove('did')
			tileDiv.classList.remove('good')
			tileDiv.classList.add('down')
			
			var word = game.wordNowGet()
			gWordNowDiv.classList.remove('goodWord')
			gScoreDiv.classList.remove('scoreAdd')
			gWordNowDiv.innerHTML = word
		}
	},

	deviceGet: function() {
		if(!game.device) {
			var s = navigator.userAgent
			if(/Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(s)) {
				game.mobile = true
				s = s.toLowerCase()
				game.device = "ios"
				if(s.indexOf('android') >= 0)
					game.device = "android"
			} else {
				game.device = "windows"
				if(navigator.platform.substr(0,3) == 'Mac')
					game.device = "mac"
			}
		}
		return game.device

	boardSetup: function() {
		var x=0,y=0
		game.board = []
		for(var i=0; i<game.boardString.length; i++) {
			if(!game.board[x])
				game.board[x] = []
			game.board[x][y] = game.boardString[i]
			x++
			if(x>=game.boardSizeX) {
				x=0
				y++
			}
		}

	wordsSetup: function() {
		game.wordsInBoardSorted = []
		game.wordsInBoard = {}
		for(var name of game.words) {
			var word = {name}
			word.points = game.wordPointsGet(name)
			game.wordsInBoard[name] = word
			game.wordsInBoardSorted.push(word)
		}

			var wordI = game.demoWords.substr(0,i).split(' ').length-1
			document.getElementById('gDemoText'+wordI).style.color = '#0FD'
			var letterI = i
			while(letterI>0) {
				letterI--
				if(game.demoWords[letterI] == ' ')break
			}
			for(; letterI<i; letterI++) {
				var letter2 = game.demoWords[letterI]
				var tile = document.getElementById('gDemoTile'+letter2.toUpperCase())
				if(tile) {
					tile.classList.remove('down')
					tile.classList.add('goodDemo')
					!function(tile){setTimeout(()=>tile.classList.remove('goodDemo'),500)}(tile)
				}
				gDemoArrows.innerHTML = ''
			}
		} else {
			var tile = document.getElementById('gDemoTile'+letter.toUpperCase())
			tile.classList.add('down')
			var letter0 = game.demoWords[i-1]
			if(letter0 && letter0!=' ') {
				var tile0 = document.getElementById('gDemoTile'+letter0.toUpperCase())
				var rect = tile.getBoundingClientRect()
				var rect0 = tile0.getBoundingClientRect()
				var a = Math.atan2(rect.y-rect0.y, rect.x-rect0.x)
				var x = rect0.x + rect.width/2 + Math.sign(rect.x-rect0.x)*rect.width/2 | 0
				var y = rect0.y + rect.height/2 + Math.sign(rect.y-rect0.y)*rect.height/2 | 0
				a = a/Math.PI*180+90|0
				gDemoArrows.innerHTML += `<div style='position:fixed;z-index:1;top:${y}px;left:${x}px;color:#0FD;font-size:4rem;transform:translate(-50%, -50%) rotate(${a}deg)'>↑</div>`
			}
		}
		
		if(i < game.demoWords.length) {
			setTimeout(() => game.demoUpdate(i+1), 111 + (letter==' '?500:0))
		}
	},
	ajax: function(url, f, onError) {
		url = gSiteUrl+'/'+url
			+ "&v="+game.appVersion
			+ "&platform="+gPlatform
			+ "&userId="+game.storageGet('userId')
			+ "&userToken="+game.storageGet('userToken')
			+ "&refer="+encodeURIComponent(document.referrer)
			
		gLog('ajax', url)
		fetch(url).then(r=>r.text()).then(r=>f(r.split(','))).catch((e)=>onError && onError(e))
	}
}

function gBlockTaps(e) {
	var div = e.target
	while(1) {
		if(!div || !div.classList)
			return true
		if(gOr(div.tagName,'INPUT','BUTTON','A') || div.classList.contains('scroll'))
			return false
		div = div.parentNode
	}
}

function gOr(val,a,b,c,d) {
	return val==a || val==b || (c!==undefined && val==c) || (d!==undefined && val==d)
}


window.onload = () => {
	game.onLoad()
}

</script>

<script>
// ═══════════════════════════════════════════════════════════
// AUTO-START: Override onLoad to skip menu and start directly
// ═══════════════════════════════════════════════════════════
(function() {
  var origOnLoad = game.onLoad;
  
  game.onLoad = function() {
    game.deviceGet();
    gTutorialPlayDiv.innerHTML = '';
    game.id = 0;
    game.scoresString = '';
    game.profileName = '';
    game.profileAvatar = '';
    
    // Board/words from server config (resolved from DB level) or fallback to embedded
    if (_euphoriaBoard && _euphoriaWords && _euphoriaWords.length) {
      game.boardString = _euphoriaBoard;
      game.words = _euphoriaWords;
      game.id = 1;
    } else {
      var levelIdx = Math.floor(Math.random() * LEVELS.length);
      var level = LEVELS[levelIdx];
      game.boardString = level.board;
      game.words = level.words;
      game.id = level.id;
    }
    game.wordViewing = '';
    
    game.setup();
    
    // Skip tutorial and title, go straight to playing
    game.storageSet('tutorialSaw', 1);
    game.state = 'title';
    
    setInterval(function() { game.tick(); }, 1000);
    
    // Sync game timer to Euphoria round duration
    game.totalSecondsStart = Math.floor(_euphoriaTimeLimitMs / 1000);

    // Auto-start the game
    game.playStartSecsElapsed = 0;
    game.levelScoreAverage = 0;
    game.levelScoreBest = 0;
    game.start();
  };
  
  // Override gameOver to not call server
  var origGameOver = game.gameOver;
  game.gameOver = function() {
    if (game.score < 1) {
      // Restart with same level
      game.playStartSecsElapsed = 0;
      game.start();
      return;
    }
    game.scoreSaveLoading = 0;
    game.levelScoreAverage = 0;
    game.stateGo('over');
    // Auto-restart after 3 seconds
    setTimeout(function() {
      game.playStartSecsElapsed = 0;
      game.start();
    }, 3000);
  };
  
  // Override stateGo to hide elements we don't need
  var origStateGo = game.stateGo;
  game.stateGo = function(state) {
    origStateGo.call(game, state);
    // Always show game div when playing
    if (state === 'playing') {
      gGameDiv.style.display = 'block';
    }
  };
  
  // Hook into score changes
  var origReleased = game.released;
  game.released = function(div, word) {
    var scoreBefore = game.score;
    origReleased.call(game, div, word);
    if (game.score !== scoreBefore) {
      _euphoriaCheckScore(game.score);
    }
  };
  
  // Stub ajax
  game.ajax = function(url, f, onError) {
    gLog('ajax stubbed:', url);
    if (onError) onError(new Error('offline'));
  };
})();
</script>
